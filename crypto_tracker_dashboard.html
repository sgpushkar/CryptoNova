<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoNova — Live Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --bg2: #111318;
    --bg3: #181b23;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text1: #f0f2f8;
    --text2: #8b92a9;
    --text3: #4a5068;
    --green: #00e096;
    --green-bg: rgba(0,224,150,0.1);
    --red: #ff4d6d;
    --red-bg: rgba(255,77,109,0.1);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --gold: #f5c842;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .search-wrap {
    flex: 1;
    max-width: 320px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text1);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px 8px 32px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
    font-family: var(--mono);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .status-dot.connecting { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    min-height: calc(100vh - 61px);
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; border-right: none; border-bottom: 1px solid var(--border); }
  }

  .main { padding: 16px; overflow: hidden; }
  .sidebar { border-left: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 10px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--bg3);
    border-radius: 8px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--bg2);
    color: var(--text1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .coin-table {
    width: 100%;
    border-collapse: collapse;
  }

  .coin-table th {
    font-size: 10px;
    letter-spacing: 0.8px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 500;
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  .coin-table th:hover { color: var(--text2); }
  .coin-table th.sorted { color: var(--accent2); }

  .coin-row {
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .coin-row:hover { background: var(--bg3); }
  .coin-row.selected { background: rgba(124, 106, 247, 0.08); }
  .coin-row.flash-green { animation: flashGreen 0.6s ease-out; }
  .coin-row.flash-red { animation: flashRed 0.6s ease-out; }

  @keyframes flashGreen {
    0% { background: rgba(0,224,150,0.2); }
    100% { background: transparent; }
  }

  @keyframes flashRed {
    0% { background: rgba(255,77,109,0.2); }
    100% { background: transparent; }
  }

  .coin-table td {
    padding: 10px;
    font-size: 13px;
    vertical-align: middle;
  }

  .coin-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: var(--mono);
  }

  .coin-name { font-weight: 500; font-size: 13px; }
  .coin-symbol { font-size: 10px; color: var(--text3); font-family: var(--mono); }

  .price-cell {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    text-align: right;
  }

  .change-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
    text-align: center;
    min-width: 64px;
  }

  .change-pill.pos { background: var(--green-bg); color: var(--green); }
  .change-pill.neg { background: var(--red-bg); color: var(--red); }

  .sparkline-cell {
    width: 80px;
  }

  .mcap-cell {
    font-size: 11px;
    color: var(--text2);
    font-family: var(--mono);
    text-align: right;
    white-space: nowrap;
  }

  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .star-btn.active { color: var(--gold); }
  .star-btn:hover { color: var(--text2); }

  .rank-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    min-width: 24px;
  }

  .detail-panel {
    background: var(--bg2);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px;
  }

  .detail-coin-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .detail-coin-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--mono);
  }

  .detail-price {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }

  .detail-change {
    font-family: var(--mono);
    font-size: 13px;
    margin-top: 2px;
  }

  .chart-wrap {
    position: relative;
    height: 140px;
    margin: 12px 0;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .stat-box {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px;
  }

  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; margin-top: 4px; }

  .alerts-section { flex: 1; }

  .alert-form {
    background: var(--bg3);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 12px;
    margin-bottom: 12px;
  }

  .alert-form select,
  .alert-form input[type=text],
  .alert-form input[type=number] {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text1);
    font-family: var(--sans);
    font-size: 12px;
    padding: 7px 10px;
    width: 100%;
    outline: none;
    margin-bottom: 8px;
  }

  .alert-form select:focus,
  .alert-form input:focus { border-color: var(--accent); }

  .alert-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn.secondary {
    background: var(--bg2);
    color: var(--text2);
    border: 1px solid var(--border2);
  }

  .alert-list { display: flex; flex-direction: column; gap: 6px; }

  .alert-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .alert-item.triggered {
    border-color: var(--green);
    background: rgba(0,224,150,0.05);
  }

  .alert-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  .alert-indicator.triggered { background: var(--green); }
  .alert-indicator.watching { animation: pulse 2s infinite; }

  .alert-text { flex: 1; color: var(--text2); line-height: 1.4; }
  .alert-text strong { color: var(--text1); }

  .alert-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }

  .alert-del:hover { color: var(--red); }

  .notif-toast {
    position: fixed;
    top: 70px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 260px;
    max-width: 340px;
    z-index: 999;
    animation: slideIn 0.3s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .notif-toast.alert-toast { border-color: var(--gold); }

  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(120%); opacity: 0; }
  }

  .notif-title { font-size: 12px; font-weight: 600; color: var(--text1); margin-bottom: 4px; }
  .notif-body { font-size: 11px; color: var(--text2); font-family: var(--mono); }

  .empty-state {
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    padding: 20px;
  }

  .ticker-bar {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    overflow: hidden;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 11px;
  }

  .ticker-inner {
    display: inline-block;
    animation: tickerScroll 40s linear infinite;
  }

  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-block;
    margin-right: 28px;
    color: var(--text2);
  }

  .ticker-item .tp { color: var(--text1); font-weight: 700; }
  .ticker-item .tc.pos { color: var(--green); }
  .ticker-item .tc.neg { color: var(--red); }

  .search-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    z-index: 200;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }

  .search-dropdown.open { display: block; }

  .search-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--bg3); }

  .vol-bar-wrap {
    width: 60px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    display: inline-block;
  }

  .vol-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s ease;
  }

  .trend-indicator {
    font-size: 10px;
    font-family: var(--mono);
  }

  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--text3);
    gap: 16px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .alert-badge {
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-family: var(--mono);
    border-radius: 10px;
    padding: 1px 5px;
    margin-left: 4px;
  }

  .mode-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .mode-btn.active { border-color: var(--accent); background: rgba(124,106,247,0.1); color: var(--accent2); }

  .chart-modes { display: flex; gap: 4px; margin-bottom: 8px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .history-section {
    margin-top: 10px;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
  }

  .history-item:last-child { border-bottom: none; }
  .history-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }
</style>
</head>
<body>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">CryptoNova — Real-time cryptocurrency price tracker with alerts, watchlist, and live charts</h2>

<div class="header">
  <div class="logo">
    <div class="logo-dot" id="liveIndicator"></div>
    CryptoNova
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="globalSearch" placeholder="Search coins..." autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <div class="status-badge">
      <div class="status-dot connecting" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="status-badge" id="updateCounter" style="display:none;">
      <span id="updateCount">0</span> updates/s
    </div>
  </div>
</div>

<div class="ticker-bar">
  <div class="ticker-inner" id="tickerInner">Loading live prices...</div>
</div>

<div class="layout">
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all')">All Coins</button>
      <button class="tab" onclick="switchTab('watchlist')">Watchlist ⭐</button>
      <button class="tab" onclick="switchTab('gainers')">Top Gainers</button>
      <button class="tab" onclick="switchTab('losers')">Top Losers</button>
    </div>

    <div id="coinTableWrap">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span style="font-size:13px;">Fetching live market data...</span>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="detail-panel" id="detailPanel">
      <div id="detailContent" style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0;">
        Select a coin to view details
      </div>
    </div>

    <div class="alerts-section">
      <div class="section-label">Price Alerts <span id="alertCountBadge" class="alert-badge" style="display:none"></span></div>
      <div class="alert-form" id="alertForm">
        <select id="alertCoin">
          <option value="">Select coin...</option>
        </select>
        <div class="alert-row">
          <select id="alertType">
            <option value="above">Price goes above</option>
            <option value="below">Price goes below</option>
            <option value="change_pct_up">Rises by %</option>
            <option value="change_pct_down">Drops by %</option>
            <option value="change_inr_up">Rises by ₹</option>
            <option value="change_inr_down">Drops by ₹</option>
          </select>
          <input type="number" id="alertValue" placeholder="Value" style="margin:0;">
        </div>
        <button class="btn" onclick="addAlert()">+ Add Alert</button>
      </div>
      <div class="alert-list" id="alertList">
        <div class="empty-state">No alerts set. Add one above.</div>
      </div>

      <div class="history-section" id="historySection" style="display:none;">
        <div class="section-label" style="margin-top:12px;">Alert History</div>
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" style="position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;"></div>

<script>
const COIN_ICONS = {
  BTC:'₿',ETH:'Ξ',BNB:'B',XRP:'✕',SOL:'◎',USDC:'$',ADA:'₳',AVAX:'▲',DOGE:'Ð',TRX:'T',
  DOT:'●',LINK:'⬡',MATIC:'M',SHIB:'🐕',LTC:'Ł',UNI:'🦄',ATOM:'⚛',XLM:'*',ICP:'∞',FIL:'F',
  APT:'A',ARB:'A',OP:'O',NEAR:'N',VET:'V',ALGO:'A',HBAR:'H',MANA:'M',SAND:'S',AXS:'A'
};

const COIN_COLORS = {
  BTC:['#F7931A','#FFF8EE'],ETH:['#627EEA','#EEF2FF'],BNB:['#F3BA2F','#FFF8E0'],
  XRP:['#0085C0','#E0F4FF'],SOL:['#9945FF','#F4EEFF'],USDC:['#2775CA','#EEF5FF'],
  ADA:['#0D1E2D','#E8F0F8'],AVAX:['#E84142','#FFEEEE'],DOGE:['#C2A633','#FFF8E0'],
  TRX:['#FF0013','#FFEEEE'],DOT:['#E6007A','#FFEEEE'],LINK:['#2A5ADA','#EEF2FF'],
  MATIC:['#8247E5','#F0EEFF'],default:['#7C6AF7','#EEF0FF']
};

function getCoinColors(sym) {
  return COIN_COLORS[sym] || COIN_COLORS.default;
}

const INR_RATE = 83.5;
const TOP_SYMBOLS = [
  'BTCUSDT','ETHUSDT','BNBUSDT','XRPUSDT','SOLUSDT','ADAUSDT','AVAXUSDT',
  'DOGEUSDT','TRXUSDT','DOTUSDT','LINKUSDT','MATICUSDT','LTCUSDT','UNIUSDT',
  'ATOMUSDT','XLMUSDT','NEARUSDT','APTUSDT','ARBUSDT','OPUSDT','VETUSDT',
  'ALGOUSDT','HBARUSDT','FILUSDT','SANDUSDT','MANAUSDT','AXSUSDT','ICPUSDT'
];

let coins = {};
let alerts = JSON.parse(localStorage.getItem('cryptoAlerts') || '[]');
let watchlist = new Set(JSON.parse(localStorage.getItem('watchlist') || '[]'));
let alertHistory = JSON.parse(localStorage.getItem('alertHistory') || '[]');
let selectedCoin = null;
let currentTab = 'all';
let sortCol = 'rank'; let sortDir = 1;
let updateCounts = 0;
let coinCharts = {};
let detailChart = null;
let ws = null;
let reconnectTimer = null;
let lastPriceMap = {};

function sym2base(sym) { return sym.replace('USDT',''); }

function formatINR(usd) {
  const inr = usd * INR_RATE;
  if(inr >= 10000000) return '₹' + (inr/10000000).toFixed(2) + 'Cr';
  if(inr >= 100000) return '₹' + (inr/100000).toFixed(2) + 'L';
  if(inr >= 1000) return '₹' + inr.toLocaleString('en-IN', {maximumFractionDigits:2});
  if(inr >= 1) return '₹' + inr.toFixed(2);
  return '₹' + inr.toFixed(6);
}

function formatLargeINR(usd) {
  const inr = usd * INR_RATE;
  if(inr >= 1e13) return '₹' + (inr/1e12).toFixed(1) + 'T';
  if(inr >= 1e10) return '₹' + (inr/1e7).toFixed(1) + 'Cr';
  if(inr >= 1e7) return '₹' + (inr/1e7).toFixed(2) + 'Cr';
  if(inr >= 1e5) return '₹' + (inr/1e5).toFixed(1) + 'L';
  return '₹' + inr.toFixed(0);
}

function connectWS() {
  const streams = TOP_SYMBOLS.map(s => s.toLowerCase() + '@ticker').join('/');
  const url = 'wss://stream.binance.com:9443/stream?streams=' + streams;

  setStatus('connecting');
  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('live');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.data) processTicker(msg.data);
    } catch(err) {}
    updateCounts++;
  };

  ws.onclose = () => {
    setStatus('error');
    reconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    setStatus('error');
  };
}

function processTicker(d) {
  const sym = d.s;
  const base = sym2base(sym);
  const price = parseFloat(d.c);
  const change24h = parseFloat(d.P);
  const vol = parseFloat(d.v);
  const high = parseFloat(d.h);
  const low = parseFloat(d.l);
  const prevPrice = coins[sym]?.price;

  if(!coins[sym]) {
    coins[sym] = {
      sym, base,
      price, change24h, vol, high, low,
      rank: TOP_SYMBOLS.indexOf(sym) + 1,
      history: [],
      direction: 0
    };
  } else {
    const old = coins[sym].price;
    coins[sym].direction = price > old ? 1 : price < old ? -1 : 0;
    coins[sym].price = price;
    coins[sym].change24h = change24h;
    coins[sym].vol = vol;
    coins[sym].high = high;
    coins[sym].low = low;
  }

  const hist = coins[sym].history;
  hist.push({t: Date.now(), p: price});
  if(hist.length > 60) hist.shift();

  checkAlerts(sym, price, change24h);

  if(selectedCoin === sym) updateDetailPanel(sym);
  updateTableRow(sym, prevPrice !== price);
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const li = document.getElementById('liveIndicator');
  if(state === 'live') {
    dot.className = 'status-dot';
    txt.textContent = 'LIVE';
    li.style.background = 'var(--green)';
  } else if(state === 'connecting') {
    dot.className = 'status-dot connecting';
    txt.textContent = 'Connecting...';
    li.style.background = 'var(--gold)';
  } else {
    dot.className = 'status-dot error';
    txt.textContent = 'Reconnecting...';
    li.style.background = 'var(--red)';
  }
}

      <th onclick="setSort('change24h')" class="${sortCol==='change24h'?'sorted':''}" style="text-align:center;">24h %</th>

  rows.forEach(c => {

    html += `<tr class="coin-row${isSelected?' selected':''}" id="row_${c.sym}" onclick="selectCoin('${c.sym}')">

function updateTableRow(sym, priceChanged) {
  const coin = coins[sym];

        row.classList.add(coin.direction > 0 ? 'flash-green' : 'flash-red');
      }
    }
  }

    const chSign = coin.change24h >= 0 ? '+' : '';
    chgEl.textContent = chSign + coin.change24h.toFixed(2) + '%';
    chgEl.className = 'change-pill ' + (coin.change24h >= 0 ? 'pos' : 'neg');
  }

  drawSparkline(sym);
  if(!tableRendered) renderTable();
}

let sparkCharts = {};

function drawSparkline(sym) {
  const c = coins[sym];
  if(!c || c.history.length < 2) return;
  const canvas = document.getElementById('spark_' + sym);
  if(!canvas) return;

  const ctx = canvas.getContext('2d');
  const w = 80, h = 28;
  ctx.clearRect(0, 0, w, h);

  const prices = c.history.map(p => p.p);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;

  const isUp = c.change24h >= 0;
  const color = isUp ? '#00e096' : '#ff4d6d';

  ctx.beginPath();
  prices.forEach((p, i) => {
    const x = (i / (prices.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, isUp ? 'rgba(0,224,150,0.3)' : 'rgba(255,77,109,0.3)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();
}

function buildDetailChart(sym) {
  const c = coins[sym];
  if(!c || c.history.length < 2) return;

  const canvas = document.getElementById('detailCanvas');
  if(!canvas) return;

  const isUp = c.change24h >= 0;
  const color = isUp ? '#00e096' : '#ff4d6d';

  if(detailChartInstance) {
    const data = c.history.map(h => ({ x: h.t, y: h.p * INR_RATE }));
    detailChartInstance.data.datasets[0].data = data;
    detailChartInstance.data.datasets[0].borderColor = color;
    detailChartInstance.data.datasets[0].backgroundColor = isUp ? 'rgba(0,224,150,0.1)' : 'rgba(255,77,109,0.1)';
    detailChartInstance.update('none');
    return;
  }

  detailChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      datasets: [{
        data: c.history.map(h => ({ x: h.t, y: h.p * INR_RATE })),
        borderColor: color,
        backgroundColor: isUp ? 'rgba(0,224,150,0.1)' : 'rgba(255,77,109,0.1)',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          label: ctx => '₹' + ctx.raw.y.toLocaleString('en-IN', {maximumFractionDigits:2})
        }
      }},
      scales: {
        x: { type: 'linear', display: false },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#4a5068', font: { size: 10, family: 'Space Mono' },
            callback: v => '₹' + (v >= 1000 ? (v/1000).toFixed(1)+'K' : v.toFixed(0)) }
        }
      },
      animation: false
    }
  });
}

function setSort(col) {

}

function switchTab(tab) {

function addAlert() {
  const coin = document.getElementById('alertCoin').value;
  const type = document.getElementById('alertType').value;
  const val = parseFloat(document.getElementById('alertValue').value);

  if(!coin || isNaN(val) || val <= 0) {
    showToast('⚠ Fill in all alert fields', 'warning');
    return;
  }

  const c = coins[coin];
  const alert = {
    id: Date.now(),
    sym: coin,
    base: sym2base(coin),
    type,
    value: val,
    basePrice: c?.price || 0,
    triggered: false,
    createdAt: new Date().toISOString()
  };

  alerts.push(alert);
  saveAlerts();
  renderAlerts();
  document.getElementById('alertValue').value = '';
  showToast(`✓ Alert set for ${sym2base(coin)}`, 'success');
}

function saveAlerts() {
  localStorage.setItem('cryptoAlerts', JSON.stringify(alerts));
  const badge = document.getElementById('alertCountBadge');
  const active = alerts.filter(a => !a.triggered).length;
  badge.textContent = active;
  badge.style.display = active > 0 ? 'inline' : 'none';
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  if(alerts.length === 0) {
    list.innerHTML = '<div class="empty-state">No alerts set. Add one above.</div>';
    return;
  }

  const typeLabels = {
    above:'above', below:'below',
    change_pct_up:'rises by', change_pct_down:'drops by',
    change_inr_up:'rises by', change_inr_down:'drops by'
  };

  list.innerHTML = alerts.map(a => {
    const isPct = a.type.includes('pct');
    const valStr = isPct ? a.value + '%' : '₹' + a.value.toLocaleString('en-IN');
    return `<div class="alert-item${a.triggered?' triggered':''}">
      <div class="alert-indicator${a.triggered?' triggered':' watching'}"></div>
      <div class="alert-text">
        <strong>${a.base}</strong> ${typeLabels[a.type]} ${valStr}
        ${a.triggered?'<span style="color:var(--green);font-size:10px;"> ✓ triggered</span>':''}
      </div>
      <button class="alert-del" onclick="removeAlert(${a.id})">×</button>
    </div>`;
  }).join('');
}

function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts();
  renderAlerts();
}

function checkAlerts(sym, price, change24h) {
  let triggered = false;
  alerts.forEach(a => {
    if(a.sym !== sym || a.triggered) return;
    const baseINR = a.basePrice * INR_RATE;
    const currINR = price * INR_RATE;
    let hit = false;

    if(a.type === 'above' && currINR >= a.value) hit = true;
    if(a.type === 'below' && currINR <= a.value) hit = true;
    if(a.type === 'change_pct_up' && change24h >= a.value) hit = true;
    if(a.type === 'change_pct_down' && change24h <= -a.value) hit = true;
    if(a.type === 'change_inr_up' && currINR - baseINR >= a.value) hit = true;
    if(a.type === 'change_inr_down' && baseINR - currINR >= a.value) hit = true;

    if(hit) {
      a.triggered = true;
      triggered = true;
      const msg = `${sym2base(sym)} hit ₹${formatINR(price).replace('₹','')}`;
      showToast('🔔 Alert: ' + msg, 'alert');
      playAlertSound();
      alertHistory.unshift({ sym, base: sym2base(sym), msg, time: new Date().toISOString() });
      if(alertHistory.length > 20) alertHistory.pop();
      localStorage.setItem('alertHistory', JSON.stringify(alertHistory));
      renderAlertHistory();

      if(Notification.permission === 'granted') {
        new Notification('CryptoNova Alert', { body: msg, icon: '⚡' });
      }
    }
  });

  if(triggered) { saveAlerts(); renderAlerts(); }
}

}

let audioCtx = null;

function playAlertSound() {
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

function showToast(msg, type = 'success') {
  const cont = document.getElementById('toastContainer');
  const div = document.createElement('div');
  div.className = 'notif-toast' + (type === 'alert' ? ' alert-toast' : '');
  div.innerHTML = `<div class="notif-title">${msg.split(':')[0]}</div>${msg.includes(':') ? '<div class="notif-body">'+msg.split(':').slice(1).join(':').trim()+'</div>' : ''}`;
  cont.appendChild(div);
  setTimeout(() => {
    div.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => div.remove(), 300);
  }, 4000);
}
